version: 2
updates:
  # Keep GitHub Actions up-to-date so the Pages build doesn't break on
  # Node-runtime deprecations (e.g. Node 20 → 24 forced on 2026-06-02).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
