# Research axes -> category-tag buckets.
# The `categories` list maps each `category` value used in
# `_publications/*.md` front matter onto one of four research axes.
# Matching is case-insensitive.
# An entry with multiple `category` values matches each corresponding axis.

- slug: 3d-perception
  label: "3D Perception"
  long_label: "3D Perception and Scene Understanding"
  image: research/axis_multi2.PNG
  description: >
    Autonomous vehicles rely on cameras, LiDARs, radars, and ultrasonics to
    perceive their surroundings. We study how to fuse and interpret these
    multi-modal signals to build accurate 3D representations of the driving
    scene — object detection, semantic segmentation, depth estimation,
    motion forecasting, and pose estimation.
  categories:
    - 3d-perception
    - 3d-reconstruction
    - 3d
    - multi-sensor
    - lidar
    - point-cloud
    - segmentation
    - semantic segmentation
    - bev segmentation
    - occupancy
    - scene understanding
    - pose
    - monocular depth estimation
    - surface normal estimation
    - gaussian-splatting
    - quadric
    - 2d tracking
    - multi-target tracking
    - perception
    - distillation

- slug: foundation
  label: "Foundation & World Models"
  long_label: "Foundation Models and World Modeling"
  image: research/axis_wm.jpg
  description: >
    Large-scale pretrained models can go beyond fixed ontologies and adapt to
    a wide variety of downstream tasks. We investigate vision and
    vision-language foundation models, as well as world models that learn to
    simulate and predict how driving scenes evolve over time — enabling
    better generalization with less task-specific supervision.
  categories:
