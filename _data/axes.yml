    - multimodal
    - vision-language
    - instruction tuning
    - in-context learning
    - zero shot
    - zero-shot
    - open-vocabulary
    - pretraining
    - post-training
    - parameter efficient finetuning
    - low-rank adaptation
    - transfer learning
    - active learning
    - meta-learning
    - generative model
    - diffusion
    - gan
    - image synthesis
    - unsupervised
    - learning from video
    - long-range tracking
    - optimal-transport
    - world model

- slug: physical-ai
  label: "Physical AI & E2E"
  long_label: "Physical AI and End-to-End Planning"
  image: research/axis_e2e.jpg
  description: >
    Rather than treating perception and decision-making as separate modules,
    end-to-end approaches learn to map sensor inputs directly to driving
    actions. We explore neural planning architectures and physical AI methods
    that reason jointly about scene understanding and trajectory planning —
    aiming for driving systems that are both simpler and more effective.
  categories:
    - driving
    - autonomous-driving
    - motion forecasting
    - motion-forecasting
    - motion-planning
    - planning
    - trajectory-prediction
    - trajectory-optimization
    - prediction
    - dynamics
    - end-to-end
    - world-model
    - corner-case-generation
    - multi-task
    - multi-task learning
    - video compression

- slug: robust
  label: "Robust & Reliable"
  long_label: "Robust, Reliable and Explainable Models"
  image: research/axis_dependable2.PNG
  description: >
    Safety-critical applications demand models that are resilient to
    distribution shifts, adverse conditions, and unexpected inputs. We work
    on uncertainty estimation, domain generalization, robustness to
    corruptions and adversarial perturbations, and explainability methods
    that help understand and trust the decisions made by deep learning
    systems.
  categories:
    - reliability
    - robustness
    - explainability
    - interpretability
    - guidance
    - anomaly detection
    - ood
    - adversarial
    - domain-adaptation
    - domain adaptation
    - differential equation
    - solver
    - physics-informed neural networks
    - survey
    - diversity
    - deep-learning
    - deep learning
